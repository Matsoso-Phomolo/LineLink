<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Rentalink Offline</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: white;
        font-family: Inter, sans-serif;
      }

      .offline-card {
        width: min(420px, 92%);
        padding: 32px;
        border-radius: 18px;
        background: #111827;
        text-align: center;
        border: 1px solid #1e293b;
      }

      h1 {
        margin-bottom: 12px;
      }

      p {
        color: #cbd5e1;
        line-height: 1.6;
      }
    </style>
  </head>

  <body>
    <section class="offline-card">
      <h1>Rentalink Offline</h1>

      <p>
        You are currently offline.
        Please reconnect to continue using Rentalink.
      </p>
    </section>
  </body>
</html>
