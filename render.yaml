services:
  - type: web
    name: linelink-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: uploads
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
